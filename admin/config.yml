# https://decapcms.org/docs/configuration-options/
local_backend: true
backend:
  name: azure
  repo: blogorg01/blogPrj/blogPrj
  branch: main
  app_id: 933bf722-5f09-4455-aef9-aa48a4b63d55
  tenant_id: 0fdae3a8-ac40-4e2b-abdd-0135eac78f38
media_folder: "source/images"
public_folder: "/images"
site_url: "https://blog.whema.net"
logo_url: ""
locale: "en"

cfg: &cfg
  create: true
  slug: "{{fields.filename}}"
  sortable_fields:
    - "commit_date"
    - "title"
    - "date"
    - "updated"
  # https://decapcms.org/docs/widgets/
  fields:
    - label: "filename"
      name: "filename"
      widget: "string"
    - label: "title"
      name: "title"
      widget: "string"
    - label: "Publish Date"
      name: "date"
      widget: "datetime"
      format: "YYYY-MM-DD HH:mm:ss"
      date_format: "YYYY-MM-DD"
      time_format: "HH:mm:ss"
    - label: "Updeted Date"
      name: "updated"
      widget: "datetime"
      format: "YYYY-MM-DD HH:mm:ss"
      date_format: "YYYY-MM-DD"
      time_format: "HH:mm:ss"
      required: false
    - label: "cover"
      name: "cover"
      widget: "image"
      required: false
    - label: "Tags"
      name: "tags"
      widget: "select"
      multiple: true
      required: false
      options:
        - "azure"
        - "cdn"
        - "devops"
        - "docker"
        - "git"
        - "github"
        - "hexo"
        - "icarus"
        - "twikoo"
    - label: "Categories"
      name: "categories"
      widget: "select"
      multiple: true
      required: false
      options:
        - "博客搭建"
        - "猫窝"
        - "叨咕叨咕"
        - "捣鼓捣鼓"
        - "溜达溜达"
        - "猫图秀秀"
    - label: "blog post content"
      name: "body"
      widget: "markdown"
    - label: "原创"
      name: "toc"
      widget: "boolean"
      default: true
    - label: "评论"
      name: "comments"
      widget: "boolean"
      default: true
collections:
  - name: "post-2023"
    label: "Post-2023"
    folder: "source/_posts/2023"
    preview_path: "2023/{{filename}}/"
    <<: *cfg
  - name: "pages"
    label: "Pages"
    files:
      - name: "sefl-tracking"
        label: "打卡"
        file: "source/self-tracking/index.md"
        fields:
        - label: "Publish Date"
          name: "date"
          widget: "datetime"
          format: "YYYY-MM-DD HH:mm:ss"
          date_format: "YYYY-MM-DD"
          time_format: "HH:mm:ss"
        - label: "self-tracking"
          name: "body"
          widget: "markdown"
